name: PiPiClaw AOT Build

on:
  workflow_dispatch:
  push:
    branches: ["master"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 使用 UPX 压缩
          - { rid: win-x64, os: windows-latest, ext: zip, exe: PiPiClaw.exe, use_upx: true }
          # Windows ARM64 不使用 UPX (兼容性考虑)
          - { rid: win-arm64, os: windows-latest, ext: zip, exe: PiPiClaw.exe, use_upx: false }
          # Linux x64 使用 UPX
          - { rid: linux-x64, os: ubuntu-latest, ext: tar.gz, exe: PiPiClaw, use_upx: true }
          # Linux ARM64 (Ubuntu 24.04 ARM 原生环境)
          - { rid: linux-arm64, os: ubuntu-24.04-arm, ext: tar.gz, exe: PiPiClaw, use_upx: false }
          # macOS 系列通常不建议对 AOT 产物使用 UPX
          - { rid: osx-x64, os: macos-latest, ext: tar.gz, exe: PiPiClaw, use_upx: false }
          - { rid: osx-arm64, os: macos-latest, ext: tar.gz, exe: PiPiClaw, use_upx: false }

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Dependencies (Linux)
        if: startsWith(matrix.rid, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev build-essential 7zip

      - name: Build AOT
        # 强制指定 bash 以兼容多行命令符 \
        shell: bash
        run: |
          dotnet publish -c Release \
            -r ${{ matrix.rid }} \
            -p:PublishAot=true \
            -p:StripSymbols=true \
            -p:DebugType=none \
            -o ./publish_dir

      - name: UPX Compression (x64 only)
        if: matrix.use_upx == true
        uses: svenstaro/upx-action@v2
        with:
          files: ./publish_dir/${{ matrix.exe }}
          args: --best --lzma
          strip: true

      - name: Cleanup and Packaging
        shell: bash
        run: |
          cd ./publish_dir
          # 清理调试符号文件
          rm -rf *.pdb *.dbg *.dsym
          
          # 非 Windows 系统需要赋予执行权限
          if [[ "${{ matrix.os }}" != "windows-latest" ]]; then
            chmod +x ${{ matrix.exe }}
          fi

          # 极致压缩打包
          if [ "${{ matrix.ext }}" == "zip" ]; then
            7z a -tzip -mx=9 ../PiPiClaw_${{ matrix.rid }}.zip *
          else
            # 先打包 tar 保持 Linux 权限，再用 7z 进行极致 gzip 压缩
            tar cf - * | 7z a -si -tgzip -mx=9 ../PiPiClaw_${{ matrix.rid }}.tar.gz
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "PiPiClaw Latest Build"
          files: PiPiClaw_${{ matrix.rid }}.${{ matrix.ext }}
          make_latest: true
          prerelease: false
          append_body: true
          # 如果 tag 已存在则覆盖文件
          overwrite: true
